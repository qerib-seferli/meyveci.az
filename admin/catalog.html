<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#16a34a">
  <link rel="icon" href="../assets/img/logo/Cilek-logo.png">
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <title>Kataloq idarəsi | Meyvəçi.az</title>
</head>
<body data-page="admin-catalog">
  <main class="app-shell"><div class="admin-layout">
    <aside class="sidebar card"><b>Admin panel</b><nav class="side-nav" style="margin-top: 12px;"><a class="side-link" href="index.html">📊 Dashboard</a><a class="side-link" href="catalog.html">🥝 Kataloq</a><a class="side-link" href="orders.html">📦 Sifarişlər</a><a class="side-link" href="users.html">👥 İstifadəçilər</a><a class="side-link" href="content.html">📰 Kontent</a><a class="side-link" href="../index.html">🏠 Sayta qayıt</a></nav></aside>
    <section class="grid"><div class="section-head"><h1>Məhsullar və kateqoriyalar</h1></div><div class="tabs-wrap"><div class="tabs"><button class="tab active" data-tab="productsPanel">Məhsullar</button><button class="tab" data-tab="catsPanel">Kateqoriyalar</button></div>
      <section id="productsPanel" class="tab-panel active card"><h2>Məhsul əlavə/redaktə</h2><form id="productForm" class="form-grid"><input type="hidden" name="id"><input name="name" placeholder="Ad" required><input name="slug" placeholder="Slug"><select id="productCategory" name="category_id"></select><input name="price" type="number" step="0.01" placeholder="Qiymət"><input name="old_price" type="number" step="0.01" placeholder="Köhnə qiymət"><input name="stock_quantity" type="number" placeholder="Stok"><input name="unit" placeholder="Ölçü vahidi"><input name="image_url" placeholder="Şəkil linki"><input id="productImage" type="file" accept="image/*"><select name="status"><option value="active">Aktiv</option><option value="inactive">Passiv</option></select><label><input type="checkbox" name="is_featured"> Seçilmiş</label><textarea class="full" name="short_description" placeholder="Qısa açıqlama"></textarea><textarea class="full" name="description" placeholder="Ətraflı açıqlama"></textarea><button class="btn btn-primary">Saxla</button><button id="newProduct" type="button" class="btn btn-soft">Yeni</button></form><div class="table-wrap"><table><thead><tr><th>Şəkil</th><th>Məhsul</th><th>Qiymət</th><th>Stok</th><th>Status</th><th>Əməliyyat</th></tr></thead><tbody id="productTable"></tbody></table></div></section>
      <section id="catsPanel" class="tab-panel card"><h2>Kateqoriya əlavə/redaktə</h2><form id="catForm" class="form-grid"><input type="hidden" name="id"><input name="name" placeholder="Ad" required><input name="slug" placeholder="Slug"><input name="sort_order" type="number" placeholder="Sıra"><label><input type="checkbox" name="is_active" checked> Aktiv</label><textarea class="full" name="description" placeholder="Açıqlama"></textarea><button class="btn btn-primary">Saxla</button><button id="newCat" type="button" class="btn btn-soft">Yeni</button></form><div class="table-wrap"><table><thead><tr><th>Ad</th><th>Slug</th><th>Sıra</th><th>Status</th><th>Əməliyyat</th></tr></thead><tbody id="catTable"></tbody></table></div></section>
    </div></section>
  </div></main><script type="module" src="../assets/js/admin.js"></script>
</body>
</html>
