<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#16a34a">
  <link rel="icon" href="./assets/img/logo/Cilek-logo.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <title>Səbət | Meyvəçi.az</title>
</head>
<body data-page="cart">
  <main class="app-shell">
    <div class="section-head">
      <h1>Səbət</h1>
      <b id="cartTotal">0 AZN</b>
    </div>

    <section id="cartList" class="grid"></section>

    <section class="card" style="margin-top: 16px;">
      <h2>Sifarişi tamamla</h2>
      <p class="muted">Ad, telefon və ünvan profil məlumatlarından avtomatik çəkilir. İstəsən burada dəyişə bilərsən.</p>

      <form id="checkoutForm" class="form-grid checkout-compact">
        <input name="full_name" placeholder="Ad Soyad" required>
        <input name="phone" placeholder="Telefon" required>
          <select name="city_region" required>
            <option value="" disabled selected>Şəhər / rayon seçin</option>
          </select>
        <input name="address" placeholder="Ünvan" required>
        <input name="apartment" placeholder="Bina, blok, mənzil">
        <input name="door_code" placeholder="Qapı kodu">
        <input name="lat" type="number" step="any" placeholder="Latitude / xəritə eni">
        <input name="lng" type="number" step="any" placeholder="Longitude / xəritə uzunluğu">

        
                <div class="payment-secure-box full">
                  <div class="payment-secure-head">
                    <div>
                      <b>Online ödəniş</b>
                      <p>Təhlükəsiz Kapital Bank ödəniş sistemi</p>
                    </div>
                
                    <span class="secure-pill">SSL / 3D Secure</span>
                  </div>
                
                  <div class="payment-trust-row">
                    <span>🔒 Kart məlumatları saxlanılmır</span>
                    <span>🏦 Kapital Bank</span>
                    <span>🛡️ Protected Checkout</span>
                  </div>
                
                  <input type="hidden" name="payment_method" value="online_payment">
                </div>
        
        <div id="paymentHelp" class="payment-help full"></div>
        <textarea class="full" name="note" placeholder="Qısa qeyd: döngə, bina, blok, qapı kodu və s."></textarea>
        <button class="btn btn-primary full">Sifariş ver</button>
      </form>
    </section>
  </main>

  <script type="module" src="./assets/js/user.js"></script>
  <script type="module" src="./assets/js/push-notifications.js"></script>
</body>
</html>
