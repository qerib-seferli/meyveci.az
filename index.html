<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#16a34a">
  <meta name="description" content="Meyvəçi.az - təzə meyvə, tərəvəz və market məhsulları qapına qədər.">
  <link rel="icon" href="./assets/img/logo/Cilek-logo.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <title>Meyvəçi.az | Təzə məhsullar</title>
</head>
<body data-page="home">
  <div id="loader" class="loader-screen">
    <div class="loader-box">
      <img src="./assets/img/logo/Cilek-logo.png" alt="Meyvəçi.az">
      <p>Meyvəçi.az yüklənir...</p>
    </div>
  </div>

  <main class="app-shell">
    <section>
      <div class="section-head">
        <h3>Endirim kampaniyaları</h3>
      </div>
      <div id="bannerGrid" class="slider-strip"></div>
    </section>

    <section>
      <div class="section-head">
        <h3>Günün xəbərləri</h3>
      </div>
      <div id="newsGrid" class="slider-strip news-slider"></div>
    </section>

    <section class="card search-card">
      <div class="section-head">
        <div>
          <h3>Axtarış və kateqoriya</h3>
        </div>
      </div>

      <div class="search-row">
        <input id="homeSearchInput" type="search" placeholder="Məhsul adı ilə axtar...">
        <button id="clearHomeFilters" class="btn btn-soft">Sıfırla</button>
      </div>

      <div id="homeCategoryChips" class="chip-row"></div>
    </section>

    <section id="products">
      <div class="section-head">
        <h3>Məhsullar</h3>
        <button id="loadMore" class="btn btn-soft">Daha çox göstər</button>
      </div>
      <div id="productsGrid" class="product-grid"></div>
    </section>

    <section>
      <div class="section-head">
        <h3>Partnyorlar</h3>
      </div>
      <div id="partnersGrid" class="slider-strip partner-slider"></div>
    </section>
  </main>

  <script type="module" src="./assets/js/shop.js"></script>
</body>
</html>
