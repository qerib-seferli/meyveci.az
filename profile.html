<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#16a34a">
  <link rel="icon" href="./assets/img/logo/Cilek-logo.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <title>Profil | Meyvəçi.az</title>
</head>
<body data-page="profile">
  <main class="app-shell">
    <section id="profileBox" class="card">
      <div class="profile-hero">
        <img id="avatarPreview" class="profile-avatar-big" src="./assets/img/logo/Cilek-logo.png" alt="Profil şəkli">
        <h1>Profil</h1>
        <p class="muted"><span id="profileEmail"></span> • <span id="profileRole"></span></p>
      </div>

      <form id="profileForm" class="form-grid">
        <input name="first_name" placeholder="Ad">
        <input name="last_name" placeholder="Soyad">
        <input name="phone" placeholder="Telefon">
        
        <label class="avatar-upload-field">
          <input id="avatarFile" type="file" accept="image/*">
          <span class="avatar-upload-icon">📷</span>
          <span class="avatar-upload-text">Profil şəkli seç</span>
        </label>
        
        <select name="city_region" required>
          <option value="">Şəhər / rayon seçin</option>
        </select>
        <input name="address_line" placeholder="Ev ünvanı">
        <input name="apartment" placeholder="Bina, blok, mənzil">
        <input name="door_code" placeholder="Qapı kodu">
        <input name="lat" type="number" step="any" placeholder="Latitude">
        <input name="lng" type="number" step="any" placeholder="Longitude">
        <textarea class="full" name="bio" placeholder="Əlavə profil qeydləri"></textarea>
        <button class="btn btn-primary full">Yadda saxla</button>
      </form>
    </section>
  </main>

  <script type="module" src="./assets/js/user.js"></script>
</body>
</html>
